name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  cpp:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        compiler: [gcc, clang]
        include:
          - compiler: gcc
            cc: gcc
            cxx: g++
          - compiler: clang
            cc: clang
            cxx: clang++
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j

      - name: Test
        run: ctest --test-dir build --output-on-failure

  python-evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release
        env:
          CC: gcc
          CXX: g++

      - name: Build
        run: cmake --build build -j

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install just
        uses: taiki-e/install-action@v2
        with:
          tool: just

      - name: Sync evals project
        working-directory: evals
        run: uv sync --dev

      - name: Ruff check
        working-directory: evals
        run: uv run ruff check .

      - name: Ruff format check
        working-directory: evals
        run: uv run ruff format --check .

      - name: Type check
        working-directory: evals
        run: uv run ty check .

      - name: Pytest
        working-directory: evals
        run: uv run pytest
